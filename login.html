<!DOCTYPE html>
<head>
    <title>log in - car sale platform</title>
    <style>
       body {
    background-image: url("images/login.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    padding-bottom: 180px;
    box-sizing: border-box;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: rgba(0, 0, 0, 0.4);
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    top: 90%;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: transparent;
    background-image: repeating-linear-gradient(
        -45deg,
        rgba(0, 255, 157, 0) 0px,
        rgba(0, 255, 157, 0) 45px,
        rgba(0, 255, 157, 0.85) 45px,
        rgba(0, 255, 157, 0.85) 90px
    );
    z-index: -1;
}

/* ========== 돔봄으 ========== */
.box {
    height: 100px;
    top: 0px;
    padding: 0 35px;
    background-color: rgba(35, 35, 35, 1);
    position: fixed;
    right: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 999;
}

.box h1 {
    color: burlywood;
    font-family: fantasy;
    font-size: 38px;
    margin: 0;
    letter-spacing: 2px;
}

.logoarea {
    display: flex;
    align-items: center;
    gap: 20px;
}
.logoarea img {
    width: 55px;
    height: 55px;
    object-fit: cover;
    border-radius: 50%;
    transform: scale(1.4); /* LOGO 렴댕 */
}
        .navigationlinks {
    display: flex;
    gap: 38px;
}

.navigationlinks a,
.navigationlinks a:link,
.navigationlinks a:visited {
    color: white !important;
    text-decoration: none !important;
    font-size: 24px;
}

.navigationlinks a:hover {
    color: rgba(0, 255, 157, 1) !important;
}
/* ========== 되쩌휭포 ========== */
.logincontainer {
    max-width: 1400px;
    margin: 12rem auto 2rem;
    padding: 0 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

.title-group {
    text-align: center;
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
}

.logincontainer h1 {
    color: white;
    font-size: 5rem;
    font-weight: 300;
    margin: 0;
}

.welcome-text {
    color: white;
    font-size: 2rem;
    font-weight: 100;
    margin: 0;
    opacity: 0.9;
}

.loginform {
    background: rgba(87, 86, 86, 0.9);
    padding: 1.5rem 6rem;
    max-width: 700px;
    width: 100%;
    clip-path: path(
        M 0% 0%,
        C 50% -12%, 100% 18%, 100% 50%,
        C 100% 82%, 50% 112%, 0% 100%
    );
    box-sizing: border-box;
    margin-top: 300px;
    box-shadow: 0 30px 55px rgba(0, 0, 0, 0.35), 0 0 30px rgba(0,255,157,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.formgroup {
    margin-bottom: 1.4rem;
    display: flex;
    align-items: center;
    gap: 15px;
    width: 100%;
    justify-content: center;
}

.formgroup label {
    width: 90px;
    text-align: right;
    color: #ffffff;
    font-size: 1.1rem;
    white-space: nowrap;
}

.formgroup input {
    flex: 1;
    max-width: 700px;
    padding: 1rem 1.2rem;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    font-size: 1.1rem;
    background-color: rgba(255,255,255,0.12);
    color: white;
    box-sizing: border-box;
}

.searchbottom {
    background: rgba(0, 255, 157, 0.95);
    color: white;
    border: none;
    padding: 0.7rem 3rem;
    font-size: 1rem;
    width: auto;
    border-radius: 8px;
    cursor: pointer;
    margin: 0.5rem auto 0;
    display: block;
}

.loginswitch {
    text-align: center;
    margin-top: 1.5rem;
    color: rgba(0, 255, 157, 0.95);
    display: block;
    font-size: 1rem;
    text-decoration: none;
}

/* ====================== 뒀꼬鑒앴固셕친욥 ====================== */
.stats-section {
    max-width: 1400px;
    margin: 15rem auto 5rem;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
}

.stat-card {
    background: rgba(245, 245, 245, 0.85);
    border-radius: 12px;
    padding: 45px 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    transition: all 0.3s ease;
    cursor: default;
}

.stat-card:hover {
    transform: scale(1.05);
    background: rgba(230, 230, 230, 0.95);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
}

.stat-icon-circle {
    width: 70px;
    height: 70px;
    background-color: rgba(87, 86, 86, 1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: -35px;
    transition: all 0.3s ease;
}

.stat-card:hover .stat-icon-circle {
    background-color: rgba(65, 64, 64, 1);
}

.stat-icon-circle svg {
    width: 32px;
    height: 32px;
    fill: burlywood;
    transition: all 0.3s ease;
}

.stat-card:hover .stat-icon-circle svg {
    fill: rgba(0, 255, 157, 1);
}

.stat-number {
    font-size: 3.2rem;
    font-weight: 600;
    color: #333;
    margin: 10px 0 8px;
    transition: all 0.3s ease;
}

.stat-card:hover .stat-number {
    color: rgba(87, 86, 86, 1);
}

.stat-text {
    font-size: 1.1rem;
    color: #555;
    margin: 0;
    text-transform: capitalize;
}
    </style>
</head>
<body>
    <header>
        <div class="box">
            <div class="logoarea">
                <img src="images/logo.jpg">
                <h1>CAR SALE PLATFORM</h1>
            </div>
            <div class="navigationlinks">
                <a href="f1 homepage.html">homepage</a>
                <a href="search.html">search car</a>
                <a href="login.html">log in</a>
                <a href="carregistration.html">sign in</a>
                <a href="add-car-page.html">add car</a>
            </div>
        </div>
    </header>
    <main class="logincontainer">
        <div class="title-group">
            <h1>Log In</h1>
            <p class="welcome-text">Welcome to log in to our website</p>
        </div>

        <form class="loginform" id="loginform">
            <div class="formgroup">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="formgroup">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="searchbottom">log in</button>
            <a href="carregistration.html" class="loginswitch">If you don't have an account.PLease sign up here</a>
        </form>
    </main>

    <section class="stats-section">
        <div class="stat-card">
            <div class="stat-icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M12 4a4 4 0 0 1 4 4 4 4 0 0 1-4 4 4 4 0 0 1-4-4 4 4 0 0 1 4-4m0 10c4.42 0 8 1.79 8 4v2H4v-2c0-2.21 3.58-4 8-4m3.5-2.5l1.5 1.5-1.5 1.5-1.5-1.5z"/>
                </svg>
            </div>
            <div class="stat-number">232</div>
            <div class="stat-text">Trusted Clients</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                </svg>
            </div>
            <div class="stat-number">9</div>
            <div class="stat-text">Years of Experience</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.39-1.08-.7-1.66-.93l-.38-2.65c-.03-.24-.24-.42-.48-.42h-4c-.24 0-.45.18-.48.42l-.38 2.65c-.58.23-1.14.54-1.66.93l-2.49-1c-.22-.08-.49 0-.61.22l-2 3.46c-.12.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.39 1.08.7 1.66.93l.38 2.65c.03.24.24.42.48.42h4c.24 0 .45-.18.48-.42l.38-2.65c.58-.23 1.14-.54 1.66-.93l2.49 1c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
                </svg>
            </div>
            <div class="stat-number">3211</div>
            <div class="stat-text">Cars Repaired</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.19.91 1.97 2.27 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
            </div>
            <div class="stat-number">18</div>
            <div class="stat-text">Qualified Technicians</div>
        </div>
    </section>

    <script src="js/login.js"></script>
</body>
</html>
